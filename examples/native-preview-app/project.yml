name: IntentFormNativePreview

options:
  bundleIdPrefix: dev.intentform
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"

packages:
  IntentFormPreview:
    path: ../preview-ios

targets:
  IntentFormNativePreview:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: IntentFormPreview
        product: IntentFormPreview
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.intentform.native-preview
        PRODUCT_NAME: IntentFormNativePreview
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: IntentForm Preview
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGNING_ALLOWED: NO
    scheme:
      gatherCoverageData: false
