name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.28.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm benchmark:large-doc
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm verify:web-preview
      - run: pnpm verify:expo-preview
      - name: Verify checked-in preview harnesses are current
        run: git diff --exit-code -- apps/react-preview apps/web-preview apps/expo-preview
      - run: pnpm capture:react-evidence
      - run: pnpm smoke:studio
      - name: Upload browser failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: studio-browser-failure
          path: output/playwright/failures/
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload React render evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: react-render-evidence
          path: artifacts/react/
          if-no-files-found: error

  swiftui:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.28.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:swiftui
      - run: pnpm verify:swiftui-render
      - name: Upload SwiftUI native evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: swiftui-native-evidence
          path: artifacts/swiftui/
          if-no-files-found: error

  desktop:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.28.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:desktop
      - name: Inspect desktop fuses
        run: pnpm --filter @intentform/studio-desktop exec electron-fuses read --app "$PWD/output/desktop/IntentForm-darwin-$(node -p process.arch)/IntentForm.app"
      - name: Verify desktop signature
        run: codesign --verify --deep --strict --verbose=4 "output/desktop/IntentForm-darwin-$(node -p process.arch)/IntentForm.app"
      - name: Upload desktop UI evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-ui-evidence
          path: output/playwright/studio-desktop-services.png
          if-no-files-found: error
          retention-days: 14
